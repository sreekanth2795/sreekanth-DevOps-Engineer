apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay — mirrors production sizing, uses a pinned release candidate tag
bases:
- ../../base

namespace: staging

namePrefix: staging-

commonLabels:
  env: staging

# Patch: 2 replicas — same as production so load tests are representative
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    group: apps
    version: v1
    kind: Deployment
    name: web

images:
- name: nginx
  newTag: "1.27.0"
