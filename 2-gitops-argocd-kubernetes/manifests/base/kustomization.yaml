apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources declared in this base are shared by every environment overlay.
# Overlays patch only what differs per environment (replicas, image tag, etc.)
resources:
- namespace.yaml
- deployment.yaml
- service.yaml

# Common labels applied to every resource in this layer
commonLabels:
  project: gitops-argocd-demo
  managed-by: argocd
