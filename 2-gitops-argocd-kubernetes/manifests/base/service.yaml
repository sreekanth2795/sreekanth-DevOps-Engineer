apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: production
  labels:
    app: web
    managed-by: argocd
spec:
  selector:
    app: web
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  # ClusterIP is correct for internal access via ingress/port-forward.
  # Change to NodePort or LoadBalancer only when you add an ingress controller.
  type: ClusterIP
